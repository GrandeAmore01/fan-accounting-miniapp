name: Build CloudBase backend image

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudbase-backend-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CCR_REGISTRY }}
          username: ${{ secrets.CCR_USERNAME }}
          password: ${{ secrets.CCR_PASSWORD }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          provenance: false
          tags: ${{ vars.CCR_REGISTRY }}/${{ vars.CCR_NAMESPACE }}/${{ vars.CCR_REPOSITORY }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image reference to job summary
        env:
          IMAGE_REFERENCE: ${{ vars.CCR_REGISTRY }}/${{ vars.CCR_NAMESPACE }}/${{ vars.CCR_REPOSITORY }}:${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "## CloudBase image" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE_REFERENCE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: $IMAGE_DIGEST" >> "$GITHUB_STEP_SUMMARY"
